<svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66f6ca" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <!-- Hexagon Frame -->
  <path d="M50 5 L89 27.5 V72.5 L50 95 L11 72.5 V27.5 L50 5Z" stroke="url(#grad)" stroke-width="3" fill="rgba(102, 246, 202, 0.05)" filter="url(#glow)" />
  
  <!-- Monogram A -->
  <path d="M35 70 L50 25 L65 70" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M42 55 H58" stroke="white" stroke-width="4" stroke-linecap="round" />
  
  <!-- Monogram P -->
  <path d="M55 70 V35 H70 C78 35 78 50 70 50 H55" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Accent Nodes -->
  <circle cx="50" cy="25" r="2" fill="#66f6ca" />
  <circle cx="35" cy="70" r="2" fill="#22d3ee" />
  <circle cx="65" cy="70" r="2" fill="#22d3ee" />
</svg>
